name: quran_learning_app
description: A modern, beautiful, interactive, AI-powered Quran learning application.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend & Database
  supabase_flutter: ^2.5.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio & Media
  just_audio: ^0.9.38
  audio_service: ^0.18.15
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.0
  easy_localization: ^3.0.7
  font_awesome_flutter: ^10.7.0
  animate_do: ^3.3.4
  
  # AI & Utilities
  google_generative_ai: ^0.4.5
  record: ^5.1.0
  path_provider: ^2.1.3
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  msix: ^3.16.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/audio/qaida/
    - assets/audio/quran/1/
    - assets/audio/quran/112/
    - assets/audio/quran/113/
    - assets/audio/quran/114/
    - assets/translations/
    - assets/fonts/
    - assets/data/
    - assets/data/quran/
  
  fonts:
    - family: TraditionalQuran
      fonts:
        - asset: assets/fonts/traditional_quran.ttf
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
          weight: 400
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
